<svg viewBox="0 0 192 192" width="192" height="192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient (Sleek Dark Mode Map Base) -->
    <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Pin Gradient -->
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4b4b" />
      <stop offset="100%" stop-color="#c2185b" />
    </linearGradient>
    
    <!-- Glow and Shadow Filters -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Rounded Box (Plugin Icon Shape) -->
  <rect width="192" height="192" rx="46" fill="url(#mapBg)" />
  
  <!-- Map Feature: Winding Sky Blue River -->
  <path d="M-20 40 Q40 20 80 80 T212 90" stroke="#0ea5e9" stroke-width="26" fill="none" opacity="0.25" stroke-linecap="round" />
  
  <!-- Map Feature: Green Parks -->
  <path d="M 120 -10 Q 150 40 200 20 L 200 -10 Z" fill="#10b981" opacity="0.15" />
  <path d="M -10 120 Q 30 150 20 200 L -10 200 Z" fill="#10b981" opacity="0.1" />

  <!-- Map Feature: Street Grid Lines (Major Roads) -->
  <line x1="60" y1="-10" x2="60" y2="202" stroke="#475569" stroke-width="8" opacity="0.4" />
  <line x1="130" y1="-10" x2="130" y2="202" stroke="#475569" stroke-width="8" opacity="0.4" />
  <line x1="-10" y1="80" x2="202" y2="80" stroke="#475569" stroke-width="8" opacity="0.4" />
  <line x1="-10" y1="140" x2="202" y2="140" stroke="#475569" stroke-width="8" opacity="0.4" />

  <!-- Map Feature: Minor Streets (Thin Grid) -->
  <line x1="20" y1="-10" x2="20" y2="202" stroke="#475569" stroke-width="3" opacity="0.2" />
  <line x1="95" y1="-10" x2="95" y2="202" stroke="#475569" stroke-width="3" opacity="0.2" />
  <line x1="165" y1="-10" x2="165" y2="202" stroke="#475569" stroke-width="3" opacity="0.2" />
  
  <line x1="-10" y1="40" x2="202" y2="40" stroke="#475569" stroke-width="3" opacity="0.2" />
  <line x1="-10" y1="110" x2="202" y2="110" stroke="#475569" stroke-width="3" opacity="0.2" />
  <line x1="-10" y1="170" x2="202" y2="170" stroke="#475569" stroke-width="3" opacity="0.2" />

  <!-- Map Feature: Winding Orange Highway -->
  <path d="M-10 160 Q80 180 110 110 T202 50" stroke="#f59e0b" stroke-width="5" fill="none" opacity="0.5" stroke-linecap="round" />

  <!-- Glowing Route Path (Indigo/Neon Purple Navigation Line) -->
  <path d="M 60 180 L 60 140 L 130 140 L 130 92" stroke="#6366f1" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <path d="M 60 180 L 60 140 L 130 140 L 130 92" stroke="#a5b4fc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Route Start Node (Small Dot) -->
  <circle cx="60" cy="180" r="5" fill="#6366f1" stroke="#ffffff" stroke-width="2" />

  <!-- Realistic Pin Ellipse Shadow -->
  <ellipse cx="130" cy="116" rx="14" ry="5" fill="#000000" opacity="0.5" />

  <!-- Floating Pin Vector -->
  <g transform="translate(0, -6)" filter="url(#shadow)">
    <!-- 3D Balloon Pin Shape (Point centered exactly at x=130, y=122 above the shadow) -->
    <path d="M 130 122 
             C 120 106, 108 96, 108 82 
             C 108 70, 118 60, 130 60 
             C 142 60, 152 70, 152 82 
             C 152 96, 140 106, 130 122 Z" 
          fill="url(#pinGrad)" />
    
    <!-- White Inner Core Dot -->
    <circle cx="130" cy="82" r="8" fill="#ffffff" />
  </g>
</svg>
